<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quanturion | Consulting, Calculators & Contact</title>
  <meta name="description" content="Quanturion – multilingual consulting website with calculators, structured requests, WhatsApp and email contact, and Android app download.">
  <style>
    :root {
      --bg:#06111c; --bg2:#0b1827; --panel:#0d1927; --panel2:#112236; --line:rgba(255,255,255,.09);
      --text:#eef4ff; --muted:#b6c4d6; --accent:#1e8fff; --accent2:#56b5ff; --gold:#c8a96b; --radius:24px;
      --shadow:0 20px 60px rgba(0,0,0,.35); --max:1240px; --ok:#43c27c;
    }
    * { box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body {
      margin:0; font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color:var(--text); background:linear-gradient(180deg,var(--bg),#091521 45%, #08111a 100%); line-height:1.55;
    }
    body.rtl { direction:rtl; }
    a { color:inherit; text-decoration:none; }
    img, video { max-width:100%; display:block; }
    .wrap { width:min(var(--max), calc(100% - 40px)); margin:0 auto; }
    .nav {
      position:sticky; top:0; z-index:40; backdrop-filter: blur(16px);
      background:rgba(6,17,28,.78); border-bottom:1px solid var(--line);
    }
    .nav-inner { display:flex; align-items:center; justify-content:space-between; min-height:78px; gap:22px; }
    .brand { display:flex; align-items:center; gap:14px; font-weight:700; letter-spacing:.04em; }
    .brand img { width:46px; height:46px; border-radius:14px; object-fit:cover; box-shadow:var(--shadow); }
    .brand small { display:block; color:var(--muted); font-weight:500; letter-spacing:.02em; }
    .nav-right { display:flex; align-items:center; gap:18px; flex-wrap:wrap; justify-content:flex-end; }
    .nav-links { display:flex; flex-wrap:wrap; gap:18px; color:var(--muted); font-size:14px; }
    .nav-links a:hover { color:var(--text); }
    .lang-switch { display:flex; gap:8px; background:rgba(255,255,255,.04); border:1px solid var(--line); padding:6px; border-radius:999px; direction:ltr; }
    .lang-switch button {
      background:transparent; border:none; color:var(--muted); padding:8px 12px; border-radius:999px; cursor:pointer; font:inherit; font-size:13px; font-weight:700;
    }
    .lang-switch button.active { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; box-shadow:0 10px 24px rgba(30,143,255,.28); }

    .hero { position:relative; min-height:90vh; display:grid; align-items:center; overflow:hidden; }
    .hero::before {
      content:""; position:absolute; inset:0;
      background:
        linear-gradient(90deg, rgba(6,17,28,.92) 0%, rgba(6,17,28,.84) 34%, rgba(6,17,28,.52) 58%, rgba(6,17,28,.72) 100%),
        radial-gradient(circle at 70% 20%, rgba(30,143,255,.26), transparent 32%),
        radial-gradient(circle at 78% 70%, rgba(86,181,255,.12), transparent 28%);
      z-index:1;
    }
    .hero video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:.36; }
    .hero-grid { position:relative; z-index:2; display:grid; grid-template-columns:1.12fr .88fr; gap:34px; padding:72px 0 56px; }
    .eyebrow { display:inline-flex; align-items:center; gap:10px; color:var(--accent2); font-size:14px; text-transform:uppercase; letter-spacing:.14em; }
    .eyebrow::before { content:""; width:42px; height:1px; background:linear-gradient(90deg, var(--accent2), transparent); }
    body.rtl .eyebrow::before { display:none; }
    h1 { font-size:clamp(40px, 6vw, 74px); line-height:1.03; margin:16px 0 18px; letter-spacing:-.04em; max-width:13ch; }
    .lead { font-size:clamp(18px, 2.2vw, 24px); color:var(--muted); max-width:62ch; }
    .hero-cta { display:flex; flex-wrap:wrap; gap:14px; margin-top:30px; }
    .btn {
      display:inline-flex; align-items:center; justify-content:center; gap:10px; padding:14px 20px; border-radius:999px;
      border:1px solid var(--line); background:rgba(255,255,255,.03); color:var(--text); font-weight:600; transition:.2s ease; cursor:pointer;
    }
    .btn:hover { transform:translateY(-1px); border-color:rgba(86,181,255,.45); }
    .btn.primary { background:linear-gradient(135deg,var(--accent), var(--accent2)); color:white; border:none; box-shadow:0 14px 36px rgba(30,143,255,.34); }
    .btn.block { width:100%; }
    .hero-card,.card,.panel,.text-card,.contact-box,.calc-box,.module-card,.request-card,.app-card {
      background:linear-gradient(180deg, rgba(17,34,54,.88), rgba(8,17,26,.95)); border:1px solid var(--line);
      border-radius:28px; padding:24px; box-shadow:var(--shadow);
    }
    .hero-card .quote { font-size:20px; font-weight:700; line-height:1.35; }
    .hero-card .sub { color:var(--muted); margin-top:12px; }
    .contact-chip,.stack { display:grid; gap:12px; margin-top:18px; }
    .contact-chip div,.stack > div {
      padding:12px 14px; border-radius:16px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.06);
    }
    .contact-chip span,.mini-label { display:block; color:var(--muted); font-size:13px; margin-bottom:4px; }
    section { padding:92px 0; }
    .section-head { display:flex; gap:22px; align-items:end; justify-content:space-between; margin-bottom:28px; }
    .section-head h2 { font-size:clamp(30px, 4vw, 48px); margin:0; letter-spacing:-.03em; }
    .section-head p { max-width:72ch; color:var(--muted); margin:0; }
    .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:18px; margin-top:26px; }
    .stat { background:rgba(255,255,255,.03); border:1px solid var(--line); border-radius:20px; padding:22px; }
    .stat strong { display:block; font-size:20px; margin-bottom:6px; }
    .stat span { color:var(--muted); font-size:14px; }
    .services,.modules-grid,.split-2,.contact-grid,.app-grid { display:grid; gap:18px; }
    .services { grid-template-columns:repeat(2,1fr); }
    .modules-grid { grid-template-columns:repeat(4,1fr); }
    .split-2 { grid-template-columns:1fr 1fr; align-items:start; }
    .contact-grid { grid-template-columns:.82fr 1.18fr; }
    .app-grid { grid-template-columns:1fr .9fr; align-items:center; }
    .module-card { cursor:pointer; transition:.2s ease; }
    .module-card:hover, .module-card.active { border-color:rgba(86,181,255,.45); transform:translateY(-2px); }
    .pill { display:inline-block; font-size:12px; text-transform:uppercase; letter-spacing:.12em; color:var(--accent2); margin-bottom:14px; }
    .muted { color:var(--muted); }
    .list { display:grid; gap:14px; margin-top:20px; }
    .list div { padding:14px 16px; border-inline-start:3px solid var(--accent); background:rgba(255,255,255,.03); border-radius:14px; }
    .gallery { display:grid; grid-template-columns:repeat(3,1fr); gap:18px; }
    .media-card { overflow:hidden; border-radius:28px; border:1px solid var(--line); background:var(--panel); box-shadow:var(--shadow); }
    .media-card img { width:100%; height:100%; object-fit:cover; }
    .video-panel { border-radius:30px; overflow:hidden; border:1px solid var(--line); box-shadow:var(--shadow); background:#000; }
    .field-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; }
    .field { display:grid; gap:8px; }
    .field.full { grid-column:1 / -1; }
    label { font-size:14px; color:var(--text); }
    input, select, textarea {
      width:100%; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.1); color:var(--text); border-radius:14px; padding:14px 14px; font:inherit;
    }
    textarea { min-height:120px; resize:vertical; }
    input::placeholder, textarea::placeholder { color:#8fa3ba; }
    .checkrow { display:flex; align-items:flex-start; gap:12px; padding:12px 14px; background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.06); border-radius:16px; }
    .checkrow input { width:18px; height:18px; margin-top:2px; padding:0; }
    .inline-options { display:flex; flex-wrap:wrap; gap:10px; }
    .chip {
      display:inline-flex; align-items:center; gap:8px; padding:10px 12px; border-radius:999px;
      background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); color:var(--text);
    }
    .chip input { width:auto; margin:0; }
    .result-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-top:18px; }
    .result-item { padding:16px; border-radius:18px; background:rgba(255,255,255,.035); border:1px solid rgba(255,255,255,.06); }
    .result-item strong { display:block; font-size:24px; margin-top:6px; }
    .disclaimer { margin-top:16px; font-size:14px; color:var(--muted); }
    .status { margin-top:14px; color:var(--ok); font-weight:600; }
    details.legal { background:rgba(255,255,255,.025); border:1px solid var(--line); border-radius:22px; padding:0 20px; }
    details.legal + details.legal { margin-top:14px; }
    details summary { list-style:none; cursor:pointer; padding:20px 0; font-weight:700; font-size:20px; }
    details summary::-webkit-details-marker { display:none; }
    details .legal-content { padding:0 0 22px; color:var(--muted); }
    details .legal-content strong { color:var(--text); }
    .footer { padding:34px 0 60px; color:var(--muted); border-top:1px solid var(--line); }
    .footer-row { display:flex; gap:20px; justify-content:space-between; align-items:center; flex-wrap:wrap; }
    .badge { display:inline-flex; padding:7px 10px; border-radius:999px; font-size:12px; letter-spacing:.08em; text-transform:uppercase; background:rgba(200,169,107,.12); color:#e6c996; border:1px solid rgba(200,169,107,.25); }
    .center { text-align:center; }
    .helper { font-size:13px; color:var(--muted); }

    .ltr-text, .phone-link, .email-link, .number-text { direction:ltr; unicode-bidi:isolate; display:inline-block; text-align:left; }
    .phone-link, .email-link { font-variant-numeric: tabular-nums; }
    body.rtl .contact-chip, body.rtl .stack, body.rtl .contact-box, body.rtl .hero-card { text-align:right; }
    body.rtl .contact-chip a, body.rtl .stack a, body.rtl .hero-card a { direction:ltr; unicode-bidi:isolate; display:inline-block; }
    body.rtl .field label, body.rtl .checkrow span, body.rtl .chip span, body.rtl input, body.rtl textarea, body.rtl select { text-align:right; }
    body.rtl input, body.rtl textarea, body.rtl select { direction:rtl; }
    body.rtl input[type="email"], body.rtl input[type="tel"], body.rtl input[name="email"], body.rtl input[name="phone"] { direction:ltr; text-align:left; }
    select {
      appearance:none; -webkit-appearance:none; -moz-appearance:none;
      background-color:#12263c;
      color:#f4f8ff;
      border:1px solid rgba(86,181,255,.26);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.03);
      background-image: linear-gradient(45deg, transparent 50%, #d9ecff 50%), linear-gradient(135deg, #d9ecff 50%, transparent 50%);
      background-position: calc(100% - 22px) calc(50% - 4px), calc(100% - 16px) calc(50% - 4px);
      background-size: 6px 6px, 6px 6px; background-repeat:no-repeat; padding-inline-end:42px; color-scheme:dark;
    }
    body.rtl select { background-position: 18px calc(50% - 4px), 24px calc(50% - 4px); padding-inline-start:42px; padding-inline-end:14px; }
    select:focus { outline:none; border-color:rgba(86,181,255,.72); box-shadow:0 0 0 3px rgba(30,143,255,.18); }
    select option { background:#12263c; color:#f4f8ff; }
    select option:hover, select option:checked, select option:focus { background:#1e8fff; color:#ffffff; }

    @media (max-width:1100px) {
      .modules-grid { grid-template-columns:repeat(2,1fr); }
      .contact-grid,.app-grid,.split-2 { grid-template-columns:1fr; }
    }
    @media (max-width:980px) {
      .hero-grid,.services,.stats,.gallery,.result-grid,.field-grid { grid-template-columns:1fr; }
      .nav-inner { padding:12px 0; align-items:flex-start; flex-direction:column; }
      .nav-right { width:100%; justify-content:space-between; }
      h1 { max-width:none; }
    }
  </style>
</head>
